name: Validate Firebase Functions

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - 'dependabot/**'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    env:
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/yarn
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

      - name: Build
        run: yarn build

      - name: Run tests
        run: yarn test

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Authenticate with Google Cloud
        if: env.GCP_SA_KEY != ''
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Create .env file
        if: env.GCP_SA_KEY != ''
        run: |
          echo "NEWS_API_KEY=${{ secrets.NEWS_API_KEY }}" >> .env
          echo "NEWSDATAIO_API_KEY=${{ secrets.NEWSDATAIO_API_KEY }}" >> .env
          echo "SERPAPI_API_KEY=${{ secrets.SERPAPI_API_KEY }}" >> .env
          echo "WEATHER_API_KEY=${{ secrets.WEATHER_API_KEY }}" >> .env
          echo "CALENDARIFIC_API_KEY=${{ secrets.CALENDARIFIC_API_KEY }}" >> .env

      - name: Validate Firebase Functions
        if: env.GCP_SA_KEY != ''
        run: firebase deploy --dry-run --only functions --project ${{ secrets.FIREBASE_PROJECT_ID }}


